{% extends 'base.html' %}
{% block title %}Login — Call Review Queue{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4 col-sm-10">

    <div class="text-center mb-4">
      <div class="display-4 text-info"><i class="bi bi-telephone-inbound-fill"></i></div>
      <h4 class="fw-bold mt-2">Call Review Queue</h4>
      <p class="text-muted small">Sign in to your account</p>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
              <input type="text" id="username" name="username" class="form-control"
                     placeholder="Enter your username" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" name="password" class="form-control"
                     placeholder="Enter your password" required>
            </div>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-dark btn-lg">
              <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Demo credentials hint -->
    <div class="card mt-3 border-warning bg-warning bg-opacity-10">
      <div class="card-body py-2 px-3 small">
        <p class="mb-1 fw-semibold"><i class="bi bi-info-circle"></i> Demo Credentials</p>
        <table class="table table-sm table-borderless mb-0 small">
          <thead><tr><th>Role</th><th>Username</th><th>Password</th></tr></thead>
          <tbody>
            <tr><td><span class="badge bg-danger">Admin</span></td><td>admin</td><td>Admin@123</td></tr>
            <tr><td><span class="badge bg-primary">User</span></td><td>jsmith</td><td>User@123</td></tr>
            <tr><td><span class="badge bg-success">Complaint</span></td><td>tom.harris</td><td>Complaint@123</td></tr>
            <tr><td><span class="badge bg-info text-dark">QA</span></td><td>qa.user</td><td>QA@123</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
{% endblock %}
